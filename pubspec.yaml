name: flutter_zxing
description: A barcode scanner and generator natively in Flutter with Dart FFI based on ZXing.
version: 2.3.0
repository: https://github.com/khoren93/flutter_zxing
publish_to: none

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: ">=3.44.0"

dependencies:
  camera: ">=0.12.0 <0.13.0"
  ffi: ^2.2.0
  flutter:
    sdk: flutter
  image: 
    git: https://github.com/kumsumit/image.git
  image_picker: ^1.0.0

dev_dependencies:
  ffigen: ">=12.0.0 <21.0.0" # dart run ffigen --config ffigen.yaml
  flutter_lints: ">=4.0.0 <7.0.0"
  flutter_test:
    sdk: flutter
  melos: ">=7.1.1 <8.0.0"

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true

# Publish to pub.dev
# flutter pub publish --dry-run
# flutter pub publish

# Update zxing-cpp submodule
# git submodule update --remote
